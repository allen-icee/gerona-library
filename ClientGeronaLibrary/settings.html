<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Setup - Library Terminal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
        <style>
            body {
                background: linear-gradient(135deg, #fdf2f8, #fff1f2, #ffe4e6);
            }
            .glass {
                backdrop-filter: blur(20px);
                background: rgba(255, 255, 255, 0.8);
            }
            .toast-enter {
                transform: translateY(-30px);
                opacity: 0;
            }
            .toast-enter-active {
                transform: translateY(0);
                opacity: 1;
                transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .toast-exit {
                transform: translateY(-20px);
                opacity: 0;
                transition: all 0.3s ease;
            }
        </style>
    </head>
    <body
        class="h-screen flex flex-col items-center justify-center font-sans relative overflow-hidden"
    >
        <div
            id="toast-container"
            class="absolute top-6 left-0 right-0 flex justify-center z-50 pointer-events-none"
        ></div>

        <!-- Pink/Rose Background Blobs -->
        <div
            class="absolute -top-32 -left-32 w-96 h-96 bg-pink-400/20 rounded-full blur-3xl"
        ></div>
        <div
            class="absolute -bottom-32 -right-32 w-96 h-96 bg-rose-400/20 rounded-full blur-3xl"
        ></div>

        <div
            class="glass p-10 rounded-3xl shadow-[0_25px_70px_rgba(244,114,182,0.15)] max-w-md w-full border border-pink-100 relative z-10 transition-all duration-500 hover:shadow-[0_35px_90px_rgba(244,114,182,0.2)]"
        >
            <div class="flex justify-center mb-6">
                <div
                    class="bg-gradient-to-br from-pink-500 to-rose-500 p-5 rounded-2xl text-white shadow-lg shadow-pink-200 animate-pulse"
                >
                    <iconify-icon
                        icon="solar:monitor-camera-bold-duotone"
                        width="40"
                    ></iconify-icon>
                </div>
            </div>

            <div class="text-center mb-8">
                <h1
                    class="text-3xl font-black tracking-tight bg-gradient-to-r from-slate-900 via-pink-600 to-rose-600 bg-clip-text text-transparent"
                >
                    Library Terminal
                </h1>
                <p
                    class="text-slate-500 text-sm mt-3 font-bold leading-relaxed"
                >
                    Enter the IPv4 address of ServerGerona to connect this
                    terminal.
                </p>
            </div>

            <div class="space-y-6">
                <div>
                    <label
                        class="block text-xs font-black text-slate-600 uppercase tracking-widest mb-2"
                        >Host IP Address</label
                    >
                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-pink-500 transition"
                        >
                            <iconify-icon
                                icon="solar:server-minimalistic-bold"
                                width="20"
                            ></iconify-icon>
                        </div>
                        <input
                            type="text"
                            id="ipInput"
                            placeholder="192.168.1.10"
                            onkeydown="handleEnter(event)"
                            class="w-full pl-12 pr-4 py-3.5 bg-white/70 border border-slate-200 rounded-xl focus:ring-4 focus:ring-pink-100 focus:border-pink-500 focus:bg-white transition-all outline-none text-lg font-mono font-bold text-slate-800 tracking-wider shadow-sm"
                            autofocus
                        />
                    </div>
                </div>

                <button
                    id="connectBtn"
                    onclick="saveAndConnect()"
                    class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-xl hover:scale-[1.02] flex items-center justify-center gap-2 group"
                >
                    <span id="btnText" class="uppercase tracking-widest text-sm"
                        >Connect Terminal</span
                    >
                    <iconify-icon
                        id="btnIcon"
                        icon="solar:arrow-right-bold"
                        width="20"
                        class="group-hover:translate-x-1 transition-transform"
                    ></iconify-icon>
                </button>
            </div>
        </div>

        <script>
            window.electronAPI.onConnectionFailed((event, attemptedIp) => {
                showToast(
                    `Could not connect to ${attemptedIp}:8000. Is the server running?`,
                    "error",
                );
                resetButton();
            });

            function showToast(message, type = "error") {
                const container = document.getElementById("toast-container");
                const toast = document.createElement("div");
                const bgColor =
                    type === "error"
                        ? "bg-gradient-to-r from-red-500 to-rose-600"
                        : "bg-gradient-to-r from-pink-500 to-rose-500";
                const icon =
                    type === "error"
                        ? "solar:danger-triangle-bold"
                        : "solar:check-circle-bold";

                toast.className = `flex items-center gap-3 ${bgColor} text-white px-6 py-3 rounded-2xl shadow-xl font-bold tracking-wide text-sm toast-enter pointer-events-auto`;
                toast.innerHTML = `<iconify-icon icon="${icon}" width="20"></iconify-icon>${message}`;

                container.appendChild(toast);
                requestAnimationFrame(() =>
                    toast.classList.add("toast-enter-active"),
                );

                setTimeout(() => {
                    toast.classList.add("toast-exit");
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            function handleEnter(event) {
                if (event.key === "Enter") saveAndConnect();
            }

            function setLoadingState() {
                document.getElementById("connectBtn").disabled = true;
                document
                    .getElementById("connectBtn")
                    .classList.add("opacity-80", "cursor-not-allowed");
                document.getElementById("ipInput").disabled = true;
                document.getElementById("btnText").innerText = "CONNECTING...";
                document
                    .getElementById("btnIcon")
                    .setAttribute("icon", "solar:restart-bold");
                document
                    .getElementById("btnIcon")
                    .classList.add("animate-spin");
            }

            function resetButton() {
                document.getElementById("connectBtn").disabled = false;
                document
                    .getElementById("connectBtn")
                    .classList.remove("opacity-80", "cursor-not-allowed");
                document.getElementById("ipInput").disabled = false;
                document.getElementById("btnText").innerText =
                    "CONNECT TERMINAL";
                document
                    .getElementById("btnIcon")
                    .setAttribute("icon", "solar:arrow-right-bold");
                document
                    .getElementById("btnIcon")
                    .classList.remove("animate-spin");
                document.getElementById("ipInput").focus();
            }

            function saveAndConnect() {
                let rawInput = document.getElementById("ipInput").value.trim();
                let cleanIp = rawInput
                    .replace(/^https?:\/\//, "")
                    .split(":")[0]
                    .replace(/\/$/, "");
                const ipv4Regex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;

                if (ipv4Regex.test(cleanIp) || cleanIp === "localhost") {
                    setLoadingState();
                    window.electronAPI.saveIp(cleanIp);
                } else {
                    showToast(
                        "Invalid IP Format (e.g. 192.168.1.10).",
                        "error",
                    );
                    document.getElementById("ipInput").focus();
                }
            }
        </script>
    </body>
</html>
