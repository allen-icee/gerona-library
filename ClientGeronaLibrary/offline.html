<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Connecting to ServerGerona...</title>
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: #fdf2f8; /* Pink 50 */
                color: #be185d; /* Pink 700 */
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                text-align: center;
            }
            .spinner {
                border: 4px solid rgba(244, 114, 182, 0.3); /* Pink 400 with opacity */
                border-top: 4px solid #be185d; /* Pink 700 */
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin-bottom: 20px;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="spinner"></div>
        <h1>Looking for ServerGerona...</h1>
        <p>
            Please wait. The system will automatically reconnect once Desktop 10
            is online.
        </p>
    </body>
</html>
